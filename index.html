<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinuxForge — Master the Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #0a0c10;
    --bg1: #0f1117;
    --bg2: #161b22;
    --bg3: #1e2430;
    --bg4: #252d3a;
    --border: #2a3342;
    --border2: #344055;
    --green: #39d353;
    --green2: #26a641;
    --green3: #1a7f37;
    --greenDim: #1c3a24;
    --cyan: #58d0e8;
    --cyan2: #2aa8c0;
    --yellow: #e3c75b;
    --orange: #f0833a;
    --red: #f85149;
    --purple: #a78bfa;
    --text0: #e6edf3;
    --text1: #b0bac7;
    --text2: #7d8896;
    --text3: #4d5664;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg0);
    color: var(--text0);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── LAYOUT ─────────────────────────────────────────── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* ─── SIDEBAR ─────────────────────────────────────────── */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--green3), var(--green2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 16px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .logo-text { font-size: 17px; font-weight: 700; color: var(--text0); letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--text2); font-family: var(--mono); }

  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text0);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 12px 8px 34px;
    border-radius: 6px;
    outline: none;
    transition: border 0.2s;
  }
  .search-box input:focus { border-color: var(--green2); }
  .search-box input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 13px;
  }

  .level-tabs {
    display: flex;
    gap: 4px;
    padding: 10px 20px 0;
    flex-shrink: 0;
  }
  .level-tab {
    flex: 1;
    padding: 5px 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .level-tab:hover { border-color: var(--border2); color: var(--text1); }
  .level-tab.active-beg { background: #162a1e; border-color: var(--green3); color: var(--green); }
  .level-tab.active-int { background: #1e1e2a; border-color: #5046a0; color: var(--purple); }
  .level-tab.active-adv { background: #2a1a10; border-color: #9a4820; color: var(--orange); }

  .cmd-list-header {
    padding: 12px 20px 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text3);
    text-transform: uppercase;
    font-family: var(--mono);
    flex-shrink: 0;
  }
  .cmd-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
  }
  .cmd-list::-webkit-scrollbar { width: 4px; }
  .cmd-list::-webkit-scrollbar-track { background: transparent; }
  .cmd-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .cmd-category { margin-bottom: 4px; }
  .cat-header {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    font-size: 11px; font-weight: 600;
    color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.8px;
    font-family: var(--mono);
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.15s;
    user-select: none;
  }
  .cat-header:hover { background: var(--bg3); }
  .cat-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0;
  }
  .cat-arrow { margin-left: auto; transition: transform 0.2s; font-size: 10px; }
  .cat-arrow.open { transform: rotate(90deg); }
  .cat-items { display: none; }
  .cat-items.open { display: block; }

  .cmd-item {
    display: flex; align-items: center;
    padding: 7px 12px 7px 24px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 8px;
  }
  .cmd-item:hover { background: var(--bg3); }
  .cmd-item.active { background: var(--bg4); border-left: 2px solid var(--green2); padding-left: 22px; }
  .cmd-item-name { font-family: var(--mono); font-size: 13px; color: var(--text0); font-weight: 500; }
  .cmd-item-desc { font-size: 11px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
  .level-badge {
    margin-left: auto;
    font-size: 9px; font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .lb-beg { background: #162a1e; color: var(--green); }
  .lb-int { background: #1e1e2a; color: var(--purple); }
  .lb-adv { background: #2a1a10; color: var(--orange); }

  /* ─── MAIN PANEL ─────────────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg0);
  }

  /* ─── TOP BAR ─────────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 56px;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
  }
  .topbar-breadcrumb {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text2);
    display: flex; align-items: center; gap: 6px;
  }
  .topbar-breadcrumb .cmd-name { color: var(--green); font-weight: 600; }
  .topbar-stats {
    margin-left: auto;
    display: flex; align-items: center; gap: 16px;
  }
  .stat-chip {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text2); font-family: var(--mono);
  }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* ─── CONTENT AREA ─────────────────────────────────────────── */
  .content { flex: 1; display: flex; overflow: hidden; }

  /* ─── DOC PANEL ─────────────────────────────────────────── */
  .doc-panel {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }
  .doc-panel::-webkit-scrollbar { width: 4px; }
  .doc-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .cmd-hero {
    margin-bottom: 28px;
  }
  .cmd-hero-top {
    display: flex; align-items: flex-start; gap: 16px; margin-bottom: 12px;
  }
  .cmd-big-name {
    font-family: var(--mono);
    font-size: 36px; font-weight: 700;
    color: var(--green);
    letter-spacing: -1px;
  }
  .cmd-level-pill {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-top: 10px;
  }
  .cmd-full-name {
    font-size: 14px; color: var(--text2);
    font-family: var(--mono);
    margin-bottom: 8px;
  }
  .cmd-description {
    font-size: 15px; color: var(--text1);
    line-height: 1.7; max-width: 680px;
  }

  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--text3); font-family: var(--mono);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  /* Syntax block */
  .syntax-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--cyan);
    letter-spacing: 0.3px;
    overflow-x: auto;
  }
  .syn-cmd { color: var(--green); font-weight: 600; }
  .syn-opt { color: var(--yellow); }
  .syn-arg { color: var(--text1); }
  .syn-meta { color: var(--text3); }

  /* Flags table */
  .flags-table { width: 100%; border-collapse: collapse; }
  .flags-table th {
    text-align: left; padding: 8px 12px;
    font-size: 11px; font-weight: 600;
    color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px;
    font-family: var(--mono);
    border-bottom: 1px solid var(--border);
  }
  .flags-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px; vertical-align: top;
  }
  .flags-table tr:hover td { background: var(--bg2); }
  .flag-code {
    font-family: var(--mono); font-weight: 600;
    color: var(--yellow); white-space: nowrap;
  }
  .flag-desc { color: var(--text1); }
  .flag-example { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* Examples */
  .example-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .example-header {
    padding: 8px 14px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .example-header .dots { display: flex; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #f85149; } .dot-y { background: #f0883e; } .dot-g { background: #3fb950; }
  .example-label {
    font-size: 11px; color: var(--text2); font-family: var(--mono);
    margin-left: 4px;
  }
  .example-body { padding: 14px; }
  .example-cmd {
    font-family: var(--mono); font-size: 13px;
    color: var(--green); margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .example-cmd::before { content: '$'; color: var(--text3); }
  .example-out {
    font-family: var(--mono); font-size: 12px;
    color: var(--text2); line-height: 1.6;
    background: var(--bg1); padding: 10px 12px;
    border-radius: 5px; margin-top: 8px;
    white-space: pre-wrap; word-break: break-word;
  }
  .example-note {
    font-size: 12px; color: var(--text3);
    margin-top: 8px; line-height: 1.5;
    font-style: italic;
  }

  /* Flow diagram */
  .flow-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
    display: flex; flex-direction: column; align-items: center;
    gap: 4px;
  }
  .flow-step {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 6px; padding: 8px 20px;
    font-family: var(--mono); font-size: 12px;
    color: var(--text1); text-align: center; width: 100%; max-width: 400px;
  }
  .flow-step.hl { border-color: var(--green3); color: var(--green); }
  .flow-arrow { color: var(--text3); font-size: 16px; }

  /* ─── TERMINAL PANEL ─────────────────────────────────────────── */
  .terminal-panel {
    width: 380px;
    min-width: 380px;
    border-left: 1px solid var(--border);
    background: var(--bg1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .terminal-header {
    padding: 10px 14px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .terminal-header .dots { display: flex; gap: 5px; }
  .terminal-title {
    font-family: var(--mono); font-size: 12px;
    color: var(--text2); margin-left: 4px;
  }
  .terminal-tab {
    margin-left: auto;
    background: var(--greenDim);
    color: var(--green);
    font-size: 10px; font-family: var(--mono);
    padding: 3px 8px; border-radius: 3px;
    font-weight: 600;
  }
  .terminal-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.7;
  }
  .terminal-body::-webkit-scrollbar { width: 3px; }
  .terminal-body::-webkit-scrollbar-thumb { background: var(--border2); }
  .t-line { color: var(--text2); }
  .t-prompt { color: var(--green); }
  .t-cmd { color: var(--text0); }
  .t-out { color: var(--text2); }
  .t-err { color: var(--red); }
  .t-info { color: var(--cyan); }
  .t-success { color: var(--green); }
  .t-dir { color: var(--cyan); font-weight: 600; }
  .t-file { color: var(--text0); }
  .t-exec { color: var(--green); font-weight: 600; }
  .t-link { color: var(--cyan2); }
  .terminal-input-row {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .terminal-prompt {
    font-family: var(--mono); font-size: 12.5px;
    color: var(--green); white-space: nowrap;
  }
  .terminal-input {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    color: var(--text0);
    font-family: var(--mono); font-size: 12.5px;
    caret-color: var(--green);
  }
  .terminal-run-btn {
    background: var(--greenDim);
    border: 1px solid var(--green3);
    color: var(--green);
    font-family: var(--mono); font-size: 11px;
    padding: 4px 10px; border-radius: 4px;
    cursor: pointer; transition: all 0.15s;
  }
  .terminal-run-btn:hover { background: var(--green3); color: #fff; }

  .terminal-quick-btns {
    padding: 8px 14px 4px;
    display: flex; gap: 4px; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .qbtn {
    font-family: var(--mono); font-size: 11px;
    padding: 4px 8px;
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text2); border-radius: 4px;
    cursor: pointer; transition: all 0.15s;
  }
  .qbtn:hover { border-color: var(--green2); color: var(--green); background: var(--bg3); }

  /* ─── WELCOME SCREEN ─────────────────────────────────────────── */
  .welcome-screen {
    padding: 40px 32px;
    display: flex; flex-direction: column;
    align-items: flex-start;
  }
  .welcome-badge {
    font-family: var(--mono); font-size: 11px;
    background: var(--greenDim); color: var(--green);
    padding: 4px 10px; border-radius: 4px;
    margin-bottom: 16px; display: inline-block;
    border: 1px solid var(--green3);
  }
  .welcome-title {
    font-size: 32px; font-weight: 700;
    color: var(--text0); margin-bottom: 10px;
    line-height: 1.2; letter-spacing: -0.5px;
  }
  .welcome-title span { color: var(--green); }
  .welcome-sub {
    font-size: 15px; color: var(--text2);
    line-height: 1.6; max-width: 580px; margin-bottom: 28px;
  }
  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; width: 100%; max-width: 540px; margin-bottom: 32px;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .stat-num { font-size: 26px; font-weight: 700; font-family: var(--mono); color: var(--text0); }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .path-cards {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; width: 100%; max-width: 600px;
  }
  .path-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
    cursor: pointer; transition: all 0.2s;
  }
  .path-card:hover { border-color: var(--border2); background: var(--bg3); transform: translateY(-1px); }
  .path-card-icon { font-size: 20px; margin-bottom: 8px; }
  .path-card-title { font-size: 14px; font-weight: 600; color: var(--text0); margin-bottom: 4px; }
  .path-card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }

  /* ─── RESPONSIVE SCROLLBAR ─────────────────────────────────────────── */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* Tip box */
  .tip-box {
    background: #0d1f2d;
    border: 1px solid #1a3a52;
    border-left: 3px solid var(--cyan);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px; color: var(--text1);
    line-height: 1.6; margin: 12px 0;
  }
  .tip-box strong { color: var(--cyan); }

  .warn-box {
    background: #1f1a0d;
    border: 1px solid #3a2a1a;
    border-left: 3px solid var(--orange);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px; color: var(--text1);
    line-height: 1.6; margin: 12px 0;
  }
  .warn-box strong { color: var(--orange); }

  /* ─── RESPONSIVE ADDITIONS ──────────────────────────── */
  .mobile-menu-btn {
    display: none;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text0);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 14px;
    align-items: center;
    justify-content: center;
  }

  @media (max-width: 1024px) {
    .terminal-panel {
      width: 320px;
      min-width: 320px;
    }
  }

  @media (max-width: 900px) {
    .content {
      flex-direction: column;
    }
    .terminal-panel {
      width: 100%;
      min-width: 100%;
      height: 300px;
      border-left: none;
      border-top: 1px solid var(--border);
    }
    .doc-panel {
      padding: 20px;
    }
  }

  @media (max-width: 768px) {
    .mobile-menu-btn { display: flex; }
    .sidebar {
      position: fixed;
      left: -280px;
      top: 0;
      bottom: 0;
      z-index: 1000;
      box-shadow: 20px 0 50px rgba(0,0,0,0.5);
      transition: left 0.3s ease;
    }
    .sidebar.open {
      left: 0;
    }
    .main {
      width: 100%;
    }
    .topbar {
      padding: 0 16px;
      justify-content: space-between;
    }
    .topbar-stats {
      display: none; /* Hide stats on very small screens to save space */
    }
    .cmd-big-name {
      font-size: 28px;
    }
    .welcome-title {
      font-size: 24px;
    }
    .stats-grid, .path-cards {
      grid-template-columns: 1fr;
    }
    
    /* Overlay when sidebar is open */
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(2px);
      z-index: 999;
    }
    .sidebar-overlay.open { display: block; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ─── SIDEBAR OVERLAY ─── -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileMenu()"></div>

  <!-- ─── SIDEBAR ─────────────────────────────────────────── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
        <div class="logo">
          <div class="logo-icon">$_</div>
          <div class="logo-text">LinuxForge</div>
        </div>
        <button class="mobile-menu-btn" style="color:var(--text3); border:none; background:none; font-size:20px; padding:0;" onclick="toggleMobileMenu()">&times;</button>
      </div>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search commands..." oninput="filterCommands(this.value)">
      </div>
    </div>

    <div class="level-tabs">
      <button class="level-tab active-beg" onclick="filterLevel('all', this)">All</button>
      <button class="level-tab" onclick="filterLevel('beginner', this)">Beginner</button>
      <button class="level-tab" onclick="filterLevel('intermediate', this)">Inter.</button>
      <button class="level-tab" onclick="filterLevel('advanced', this)">Advanced</button>
    </div>

    <div class="cmd-list-header">Commands</div>
    <div class="cmd-list" id="cmdList"></div>
  </div>

  <!-- ─── MAIN ─────────────────────────────────────────── -->
  <div class="main">
    <div class="topbar">

let vfs = {
  '/': { type: 'd', children: ['home','var','etc','usr','tmp','bin'] },
  '/home': { type: 'd', children: ['alice'] },
  '/home/alice': { type: 'd', children: ['Desktop','Documents','Downloads','projects','.bashrc','.bash_history'] },
  '/home/alice/Desktop': { type: 'd', children: [] },
  '/home/alice/Documents': { type: 'd', children: ['report.pdf','notes.txt','resume.pdf'] },
  '/home/alice/Downloads': { type: 'd', children: ['ubuntu.iso','archive.tar.gz'] },
  '/home/alice/projects': { type: 'd', children: ['linuxforge','myapp'] },
  '/home/alice/projects/linuxforge': { type: 'd', children: ['index.html','app.js','README.md'] },
  '/home/alice/projects/myapp': { type: 'd', children: ['main.py','utils.py','requirements.txt'] },
  '/home/alice/.bashrc': { type: 'f', content: 'export PATH=$PATH:~/.local/bin\nalias ll="ls -lah"\nalias gs="git status"' },
  '/home/alice/.bash_history': { type: 'f', content: 'ls -la\ncd projects\ngit status\nsudo apt update' },
  '/var': { type: 'd', children: ['log','www','lib'] },
  '/var/log': { type: 'd', children: ['syslog','auth.log','nginx'] },
  '/var/log/syslog': { type: 'f', content: 'Mar 15 10:22:31 linuxforge kernel: boot successful\nMar 15 10:22:35 linuxforge sshd: Server listening on 0.0.0.0 port 22\nMar 15 11:45:12 linuxforge sshd: Accepted publickey for alice\nMar 15 12:00:01 linuxforge CRON: (alice) CMD (/home/alice/backup.sh)' },
  '/var/log/auth.log': { type: 'f', content: 'Mar 15 11:45:12 linuxforge sshd: Accepted publickey for alice from 192.168.1.10\nMar 15 14:22:33 linuxforge sudo: alice : TTY=pts/0 ; USER=root ; COMMAND=/usr/bin/apt update' },
  '/var/log/nginx': { type: 'd', children: ['access.log','error.log'] },
  '/var/www': { type: 'd', children: ['html'] },
  '/var/www/html': { type: 'd', children: ['index.html'] },
  '/etc': { type: 'd', children: ['hosts','passwd','nginx','ssh'] },
  '/etc/hosts': { type: 'f', content: '127.0.0.1 localhost\n127.0.1.1 linuxforge\n::1 localhost ip6-localhost ip6-loopback' },
  '/etc/passwd': { type: 'f', content: 'root:x:0:0:root:/root:/bin/bash\ndaemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin\nalice:x:1000:1000:Alice Smith:/home/alice:/bin/bash\nbob:x:1001:1001:Bob Jones:/home/bob:/bin/bash' },
  '/etc/nginx': { type: 'd', children: ['nginx.conf','sites-available'] },
  '/etc/ssh': { type: 'd', children: ['sshd_config','ssh_config'] },
  '/usr': { type: 'd', children: ['bin','local','share'] },
  '/tmp': { type: 'd', children: ['cache.tmp','lock.pid'] },
  '/bin': { type: 'd', children: ['bash','ls','cp','mv','rm','cat','grep'] },

let cwdPath = '/home/alice';
let history = [];
let histIdx = -1;

function resolvePath(p) {
  if (!p || p === '~') return '/home/alice';
  if (p.startsWith('~/')) p = '/home/alice/' + p.slice(2);
  if (!p.startsWith('/')) {
    p = cwdPath.endsWith('/') ? cwdPath + p : cwdPath + '/' + p;
  }
  const parts = p.split('/').filter(Boolean);
  const resolved = [];
  for (const part of parts) {
    if (part === '.') continue;
    else if (part === '..') resolved.pop();
    else resolved.push(part);
  }
  return '/' + resolved.join('/');
}

function termLine(content, cls='t-out') {
  return `<div class="${cls}">${content}</div>`;
}

function runCmd(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return '';
  history.unshift(trimmed);
  histIdx = -1;

  const parts = trimmed.split(/\s+/);
  const cmd = parts[0];
  const args = parts.slice(1);

  const prompt = `<div class="t-line"><span class="t-prompt">alice@linuxforge:${cwdPath.replace('/home/alice','~')}$</span> <span class="t-cmd">${escH(raw)}</span></div>`;

  switch(cmd) {
    case 'pwd': return prompt + termLine(cwdPath);

    case 'ls': {
      let path = cwdPath;
      let flags = '';
      for (const a of args) {
        if (a.startsWith('-')) flags += a;
        else path = resolvePath(a);
      }
      const node = vfs[path];
      if (!node) return prompt + termLine(`ls: cannot access '${escH(args.find(a=>!a.startsWith('-'))||'.')}': No such file or directory`, 't-err');
      if (node.type === 'f') return prompt + termLine(path.split('/').pop());
      const items = node.children || [];
      if (flags.includes('l')) {
        const rows = items.map(name => {
          const childPath = path === '/' ? '/' + name : path + '/' + name;
          const child = vfs[childPath];
          const isDir = child && child.type === 'd';
          const perm = isDir ? 'drwxr-xr-x' : '-rw-r--r--';
          const cls = isDir ? 't-dir' : (name.startsWith('.') ? 'text2' : 't-file');
          return `<div class="t-out">${perm}  1 alice users  4096 Mar 15 10:22 <span class="${cls}">${escH(name)}</span></div>`;
        });
        return prompt + rows.join('');
      } else {
        const names = items.map(name => {
          const childPath = path === '/' ? '/' + name : path + '/' + name;
          const child = vfs[childPath];
          const isDir = child && child.type === 'd';
          const cls = isDir ? 't-dir' : 't-file';
          return `<span class="${cls}">${escH(name)}</span>`;
        });
        return prompt + `<div class="t-out" style="display:flex;flex-wrap:wrap;gap:8px 16px;">${names.join('')}</div>`;
      }
    }

    case 'cd': {
      const target = resolvePath(args[0] || '~');
      if (!vfs[target]) return prompt + termLine(`cd: ${escH(target)}: No such file or directory`, 't-err');
      if (vfs[target].type !== 'd') return prompt + termLine(`cd: ${escH(target)}: Not a directory`, 't-err');
      cwdPath = target;
      return prompt;
    }

    case 'cat': {
      if (!args.length) return prompt + termLine('cat: missing operand', 't-err');
      let out = '';
      for (const a of args) {
        const p = resolvePath(a);
        const node = vfs[p];
        if (!node) { out += termLine(`cat: ${escH(a)}: No such file or directory`, 't-err'); continue; }
        if (node.type === 'd') { out += termLine(`cat: ${escH(a)}: Is a directory`, 't-err'); continue; }
        const content = node.content || '(empty file)';
        out += termLine(escH(content).replace(/\n/g,'<br>'));
      }
      return prompt + out;
    }

    case 'mkdir': {
      const name = args.find(a => !a.startsWith('-'));
      if (!name) return prompt + termLine('mkdir: missing operand', 't-err');
      const newPath = resolvePath(name);
      if (vfs[newPath]) return prompt + termLine(`mkdir: cannot create directory '${escH(name)}': File exists`, 't-err');
      const parent = newPath.substring(0, newPath.lastIndexOf('/')) || '/';
      if (!vfs[parent] && !args.includes('-p')) return prompt + termLine(`mkdir: cannot create directory '${escH(name)}': No such file or directory`, 't-err');
      vfs[newPath] = { type: 'd', children: [] };
      if (vfs[parent] && vfs[parent].children) vfs[parent].children.push(newPath.split('/').pop());
      return prompt + termLine(`<span class="t-success">Directory created: ${escH(newPath)}</span>`);
    }

    case 'touch': {
      const names = args.filter(a => !a.startsWith('-'));
      if (!names.length) return prompt + termLine('touch: missing file operand', 't-err');
      let out = '';
      for (const name of names) {
        const p = resolvePath(name);
        if (!vfs[p]) {
          vfs[p] = { type: 'f', content: '' };
          const parent = p.substring(0, p.lastIndexOf('/')) || '/';
          if (vfs[parent] && vfs[parent].children) vfs[parent].children.push(p.split('/').pop());
          out += termLine(`<span class="t-success">Created: ${escH(name)}</span>`);
        } else {
          out += termLine(`Updated timestamp: ${escH(name)}`);
        }
      }
      return prompt + out;
    }

    case 'rm': {
      const names = args.filter(a => !a.startsWith('-'));
      if (!names.length) return prompt + termLine('rm: missing operand', 't-err');
      let out = '';
      for (const name of names) {
        const p = resolvePath(name);
        if (!vfs[p]) { out += termLine(`rm: cannot remove '${escH(name)}': No such file or directory`, 't-err'); continue; }
        if (vfs[p].type === 'd' && !args.some(a=>a.includes('r'))) {
          out += termLine(`rm: cannot remove '${escH(name)}': Is a directory. Use -r`, 't-err'); continue;
        }
        delete vfs[p];
        const parent = p.substring(0, p.lastIndexOf('/')) || '/';
        if (vfs[parent]) vfs[parent].children = (vfs[parent].children||[]).filter(c=>c!==p.split('/').pop());
        out += termLine(`<span style="color:var(--orange)">Removed: ${escH(name)}</span>`);
      }
      return prompt + out;
    }

    case 'echo': return prompt + termLine(escH(args.join(' ')).replace(/\\n/g,'<br>'));

    case 'whoami': return prompt + termLine('alice');
    case 'hostname': return prompt + termLine('linuxforge');
    case 'date': return prompt + termLine(new Date().toString());
    case 'uptime': return prompt + termLine('10:22:31 up 4 days, 2:15,  2 users,  load average: 0.52, 0.48, 0.44');
    case 'uname':
      if (args.includes('-a')) return prompt + termLine('Linux linuxforge 5.15.0-100-generic #110-Ubuntu SMP x86_64 GNU/Linux');
      if (args.includes('-r')) return prompt + termLine('5.15.0-100-generic');
      return prompt + termLine('Linux');

    case 'free':
      return prompt + termLine('&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;total&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;used&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;free&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;shared&nbsp;&nbsp;buff/cache&nbsp;&nbsp;&nbsp;available') +
             termLine('Mem:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;15.9Gi&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;5.2Gi&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;2.1Gi&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;420Mi&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;8.1Gi&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;9.8Gi') +
             termLine('Swap:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;2.0Gi&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;0B&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;2.0Gi');

    case 'df':
      return prompt +
        termLine('Filesystem&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Size&nbsp;&nbsp;Used&nbsp;&nbsp;Avail&nbsp;&nbsp;Use%&nbsp;&nbsp;Mounted on') +
        termLine('/dev/sda1&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;98G&nbsp;&nbsp;&nbsp;45G&nbsp;&nbsp;&nbsp;48G&nbsp;&nbsp;&nbsp;&nbsp;49%&nbsp;&nbsp;/') +
        termLine('/dev/sda2&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;500G&nbsp;&nbsp;380G&nbsp;&nbsp;120G&nbsp;&nbsp;&nbsp;76%&nbsp;&nbsp;/data') +
        termLine('tmpfs&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;7.8G&nbsp;&nbsp;1.2G&nbsp;&nbsp;&nbsp;6.6G&nbsp;&nbsp;&nbsp;16%&nbsp;&nbsp;/run');

    case 'ps':
      return prompt +
        termLine('USER&nbsp;&nbsp;&nbsp;&nbsp;PID&nbsp;&nbsp;%CPU&nbsp;%MEM&nbsp;&nbsp;&nbsp;VSZ&nbsp;&nbsp;&nbsp;RSS&nbsp;&nbsp;TTY&nbsp;&nbsp;STAT&nbsp;&nbsp;COMMAND') +
        termLine('alice&nbsp;&nbsp;&nbsp;&nbsp;1842&nbsp;&nbsp;0.0&nbsp;&nbsp;0.1&nbsp;&nbsp;8192&nbsp;&nbsp;4096&nbsp;&nbsp;pts/0&nbsp;&nbsp;Ss&nbsp;&nbsp;&nbsp;/bin/bash') +
        termLine('alice&nbsp;&nbsp;&nbsp;&nbsp;2341&nbsp;&nbsp;0.2&nbsp;&nbsp;1.4&nbsp;98765&nbsp;56789&nbsp;&nbsp;pts/0&nbsp;&nbsp;Sl+&nbsp;&nbsp;/usr/bin/node app.js') +
        termLine('alice&nbsp;&nbsp;&nbsp;&nbsp;3100&nbsp;&nbsp;0.0&nbsp;&nbsp;0.0&nbsp;&nbsp;5432&nbsp;&nbsp;1024&nbsp;&nbsp;pts/0&nbsp;&nbsp;R+&nbsp;&nbsp;&nbsp;ps aux');

    case 'ping': {
      const host = args.find(a=>!a.startsWith('-')) || 'localhost';
      const count = (() => { const ci = args.indexOf('-c'); return ci>=0 ? parseInt(args[ci+1])||4 : 4; })();
      let lines = `PING ${escH(host)} (93.184.216.34): 56(84) bytes of data.<br>`;
      for(let i=1;i<=count;i++) lines += `64 bytes from 93.184.216.34: icmp_seq=${i} ttl=56 time=${(Math.random()*10+8).toFixed(1)} ms<br>`;
      lines += `<br>--- ${escH(host)} ping statistics ---<br>${count} packets transmitted, ${count} received, 0% packet loss`;
      return prompt + termLine(lines, 't-success');
    }

    case 'clear':
    case 'reset': {
      document.getElementById('terminalBody').innerHTML = '';
      return '';
    }

    case 'history': {
      const h = history.slice().reverse();
      return prompt + h.slice(0,20).map((c,i)=>`<div class="t-out">&nbsp;&nbsp;${String(i+1).padStart(3)} ${escH(c)}</div>`).join('');
    }

    case 'grep': {
      const patternIdx = args.findIndex(a=>!a.startsWith('-'));
      if (patternIdx < 0) return prompt + termLine('grep: missing pattern', 't-err');
      const pattern = args[patternIdx];
      const fileArg = args[patternIdx+1];
      if (fileArg) {
        const p = resolvePath(fileArg);
        const node = vfs[p];
        if (!node || node.type==='d') return prompt + termLine(`grep: ${escH(fileArg)}: No such file or cannot read`, 't-err');
        const lines = (node.content||'').split('\n');
        const matches = lines.filter(l => l.toLowerCase().includes(pattern.toLowerCase()));
        if (!matches.length) return prompt + termLine(`(no matches for '${escH(pattern)}')`, 't-info');
        return prompt + matches.map(l => termLine(escH(l).replace(new RegExp(escH(pattern),'gi'),m=>`<span style="color:var(--red);font-weight:bold">${m}</span>`))).join('');
      }
      return prompt + termLine(`(grep requires a file in this simulator)`, 't-info');
    }

    case 'wc': {
      const fname = args.find(a=>!a.startsWith('-'));
      if (!fname) return prompt + termLine('wc: missing file operand', 't-err');
      const p = resolvePath(fname);
      const node = vfs[p];
      if (!node || node.type==='d') return prompt + termLine(`wc: ${escH(fname)}: No such file or directory`, 't-err');
      const content = node.content || '';
      const lines = content.split('\n').length;
      const words = content.split(/\s+/).filter(Boolean).length;
      const bytes = content.length;
      return prompt + termLine(`${String(lines).padStart(5)} ${String(words).padStart(6)} ${String(bytes).padStart(6)} ${escH(fname)}`);
    }

    case 'chmod': return prompt + termLine(`<span class="t-success">Permissions changed</span>`);
    case 'chown': return prompt + termLine(`<span class="t-success">Ownership changed</span>`);
    case 'sudo': return prompt + termLine(`[sudo] password for alice: `, 't-info') + termLine(`<span class="t-success">Running: ${escH(args.join(' '))}</span>`);
    case 'which': return prompt + termLine(`/usr/bin/${escH(args[0]||'command')}`);
    case 'man': return prompt + termLine(`<span class="t-info">Man pages not available. Click the command in the sidebar for full docs!</span>`);

    case 'help':
    case '--help': {
      return prompt + 
        termLine('<span class="t-success">LinuxForge Interactive Terminal</span>') +
        termLine('') +
        termLine('<span class="t-info">Supported commands:</span>') +
        termLine('pwd, ls, cd, cat, mkdir, touch, rm, echo, whoami, hostname') +
        termLine('date, uptime, uname, free, df, ps, ping, grep, wc, chmod, chown') +
        termLine('sudo, which, history, clear') +
        termLine('') +
        termLine('Tip: click any command in the sidebar for full documentation!', 't-info');
    }

    default:
      return prompt + termLine(`<span class="t-err">bash: ${escH(cmd)}: command not found</span>`) + termLine(`<span class="t-info">Try: help | Or search the sidebar for '${escH(cmd)}'</span>`);
  }
}

function escH(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────────────────────
function appendTerminal(html) {
  const body = document.getElementById('terminalBody');
  body.insertAdjacentHTML('beforeend', html);
  body.scrollTop = body.scrollHeight;
}

function runTermCmd() {
  const input = document.getElementById('termInput');
  const val = input.value.trim();
  if (!val) return;
  const out = runCmd(val);
  if (out) appendTerminal(out);
  input.value = '';
}

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('termInput');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { runTermCmd(); }
    else if (e.key === 'ArrowUp') {
      if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
      e.preventDefault();
    } else if (e.key === 'ArrowDown') {
      if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
      else { histIdx = -1; input.value = ''; }
      e.preventDefault();
    } else if (e.key === 'Tab') {
      e.preventDefault();
      // Simple autocomplete
      const parts = input.value.split(' ');
      const last = parts[parts.length-1];
      if (last) {
        const p = resolvePath(last);
        const parent = p.substring(0, p.lastIndexOf('/')) || '/';
        const base = p.split('/').pop();
        const node = vfs[parent];
        if (node && node.children) {
          const matches = node.children.filter(c=>c.startsWith(base));
          if (matches.length === 1) {
            parts[parts.length-1] = (last.includes('/') ? last.substring(0,last.lastIndexOf('/')+1) : '') + matches[0];
            input.value = parts.join(' ');
          }
        }
      }
    }
  });

  // Initial terminal greeting
  appendTerminal(
    termLine(`<span class="t-success">Welcome to LinuxForge Terminal Simulator!</span>`) +
    termLine(`<span class="t-info">Type commands to explore. Try: ls, pwd, cd projects, cat /etc/hosts</span>`) +
    termLine(`<span class="t-info">Type 'help' for available commands. Arrow keys for history, Tab for autocomplete.</span>`) +
    termLine(``)
  );

  buildSidebar();
  renderWelcome();
  updateQuickBtns(null);
});

const CATEGORY_COLORS = {
  'Navigation': '#26a641',
  'File Operations': '#58d0e8',
  'Text Processing': '#a78bfa',
  'Process Management': '#e3c75b',
  'Permissions': '#f0833a',
  'System Info': '#f85149',
  'Networking': '#58d0e8',
  'Advanced Search': '#e3c75b',
  'Scripting': '#a78bfa',
  'Advanced Tools': '#f0833a',
};

let currentLevel = 'all';
let currentCmd = null;

function buildSidebar(filterLevel='all', searchTerm='') {
  const list = document.getElementById('cmdList');
  const categories = {};
  for (const cmd of commands) {
    if (filterLevel !== 'all' && cmd.level !== filterLevel) continue;
    if (searchTerm && !cmd.name.includes(searchTerm.toLowerCase()) && !cmd.shortDesc.toLowerCase().includes(searchTerm.toLowerCase()) && !cmd.full.toLowerCase().includes(searchTerm.toLowerCase())) continue;
    if (!categories[cmd.category]) categories[cmd.category] = [];
    categories[cmd.category].push(cmd);
  }
  list.innerHTML = '';
  for (const [catName, cmds] of Object.entries(categories)) {
    const color = CATEGORY_COLORS[catName] || '#666';
    const catDiv = document.createElement('div');
    catDiv.className = 'cmd-category';
    catDiv.innerHTML = `
      <div class="cat-header" onclick="toggleCat(this)">
        <div class="cat-dot" style="background:${color}"></div>
        ${catName}
        <span class="cat-arrow open">▶</span>
      </div>
      <div class="cat-items open">
        ${cmds.map(cmd => `
          <div class="cmd-item ${currentCmd && currentCmd.id===cmd.id?'active':''}" onclick="selectCmd('${cmd.id}')" id="item-${cmd.id}">
            <div>
              <div class="cmd-item-name">${cmd.name}</div>
              <div class="cmd-item-desc">${cmd.shortDesc}</div>
            </div>
            <span class="level-badge lb-${cmd.level.slice(0,3)}">${cmd.level==='beginner'?'BEG':cmd.level==='intermediate'?'INT':'ADV'}</span>
          </div>
        `).join('')}
      </div>`;
    list.appendChild(catDiv);
  }
  if (!list.innerHTML) {
    list.innerHTML = `<div style="padding:16px;color:var(--text3);font-size:12px;text-align:center;">No commands found</div>`;
  }
}

function toggleCat(header) {
  const arrow = header.querySelector('.cat-arrow');
  const items = header.nextElementSibling;
  const isOpen = items.classList.contains('open');
  items.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

function filterLevel(level, btn) {
  currentLevel = level;
  document.querySelectorAll('.level-tab').forEach(b => {
    b.className = 'level-tab';
  });
  if (level === 'all') btn.className = 'level-tab active-beg';
  else if (level === 'beginner') btn.className = 'level-tab active-beg';
  else if (level === 'intermediate') btn.className = 'level-tab active-int';
  else btn.className = 'level-tab active-adv';
  buildSidebar(currentLevel, document.getElementById('searchInput').value);
}

function filterCommands(term) {
  buildSidebar(currentLevel, term);
}

// ─────────────────────────────────────────────────────────────
//  COMMAND DOC RENDER
// ─────────────────────────────────────────────────────────────
function selectCmd(id) {
  const cmd = commands.find(c => c.id === id);
  if (!cmd) return;
  currentCmd = cmd;

  // Update active in sidebar
  document.querySelectorAll('.cmd-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById(`item-${id}`);
  if (item) { item.classList.add('active'); item.scrollIntoView({ block: 'nearest' }); }

  // Update breadcrumb
  document.getElementById('breadcrumb').innerHTML = `
    <span style="color:var(--text3)">~</span>
    <span style="color:var(--text3)">/</span>
    <span style="cursor:pointer;color:var(--text2);" onclick="renderWelcome()">LinuxForge</span>
    <span style="color:var(--text3)">/</span>
    <span style="color:var(--text2)">${cmd.category}</span>
    <span style="color:var(--text3)">/</span>
    <span class="cmd-name">${cmd.name}</span>
  `;

  updateQuickBtns(cmd);

  const levelColor = cmd.level==='beginner' ? 'var(--green)' : cmd.level==='intermediate' ? 'var(--purple)' : 'var(--orange)';
  const levelBg = cmd.level==='beginner' ? '#162a1e' : cmd.level==='intermediate' ? '#1e1e2a' : '#2a1a10';

  const flagsHtml = cmd.flags ? `
    <div class="section">
      <div class="section-title">Flags & Options</div>
      <table class="flags-table">
        <thead><tr><th>Flag</th><th>Description</th></tr></thead>
        <tbody>
          ${cmd.flags.map(f => `
            <tr>
              <td><div class="flag-code">${escH(f.flag)}</div></td>
              <td>
                <div class="flag-desc">${escH(f.desc)}</div>
                ${f.ex ? `<div class="flag-example">$ ${escH(f.ex)}</div>` : ''}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  ` : '';

  const examplesHtml = cmd.examples ? `
    <div class="section">
      <div class="section-title">Examples</div>
      ${cmd.examples.map(ex => `
        <div class="example-card">
          <div class="example-header">
            <div class="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
            <span class="example-label">${escH(ex.label)}</span>
          </div>
          <div class="example-body">
            <div class="example-cmd">${escH(ex.cmd)}</div>
            ${ex.out ? `<div class="example-out">${escH(ex.out)}</div>` : ''}
            ${ex.note ? `<div class="example-note">${escH(ex.note)}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  ` : '';

  const flowHtml = cmd.flow ? `
    <div class="section">
      <div class="section-title">How It Works</div>
      <div class="flow-box">
        ${cmd.flow.map((step, i) => `
          ${i > 0 ? '<div class="flow-arrow">↓</div>' : ''}
          <div class="flow-step ${i===0||i===cmd.flow.length-1?'hl':''}">${escH(step)}</div>
        `).join('')}
      </div>
    </div>
  ` : '';

  const tipHtml = cmd.tip ? `
    <div class="tip-box"><strong>💡 Pro Tip:</strong> ${escH(cmd.tip)}</div>
  ` : '';

  const warnHtml = cmd.warn ? `
    <div class="warn-box"><strong>⚠️ Warning:</strong> ${escH(cmd.warn)}</div>
  ` : '';

  const tryBtn = `
    <button onclick="tryCmdInTerminal('${cmd.name}')" style="
      background: var(--greenDim); border: 1px solid var(--green3);
      color: var(--green); font-family: var(--mono); font-size: 12px;
      padding: 6px 14px; border-radius: 5px; cursor: pointer;
      transition: all 0.15s; margin-top: 4px;
    " onmouseover="this.style.background='var(--green3)';this.style.color='#fff'"
       onmouseout="this.style.background='var(--greenDim)';this.style.color='var(--green)'">
      ▶ Try in Terminal
    </button>
  `;

  document.getElementById('docPanel').innerHTML = `
    <div class="cmd-hero">
      <div class="cmd-hero-top">
        <span class="cmd-big-name">${escH(cmd.name)}</span>
        <span class="cmd-level-pill" style="background:${levelBg};color:${levelColor};border:1px solid ${levelColor}33;">${cmd.level.toUpperCase()}</span>
      </div>
      <div class="cmd-full-name">${escH(cmd.full)}</div>
      <div class="cmd-description">${escH(cmd.description)}</div>
      <div style="margin-top:12px">${tryBtn}</div>
    </div>

    <div class="section">
      <div class="section-title">Syntax</div>
      <div class="syntax-block">${cmd.syntax}</div>
    </div>

    ${flagsHtml}
    ${warnHtml}
    ${tipHtml}
    ${examplesHtml}
    ${flowHtml}
  `;
}

function tryCmdInTerminal(name) {
  const input = document.getElementById('termInput');
  input.value = name + ' ';
  input.focus();
}

function updateQuickBtns(cmd) {
  const container = document.getElementById('quickBtns');
  const defaults = ['ls -lah', 'pwd', 'cat /etc/hosts', 'ps aux', 'df -h', 'free -h', 'uname -a'];
  const cmds = cmd ? [cmd.name, ...(cmd.examples||[]).slice(0,2).map(e=>e.cmd.split('\n')[0])] : defaults;
  container.innerHTML = cmds.slice(0,5).map(c =>
    `<button class="qbtn" onclick="quickRun(this.textContent)">${escH(c)}</button>`
  ).join('');
}

function quickRun(cmd) {
  document.getElementById('termInput').value = cmd;
  runTermCmd();
}

// ─────────────────────────────────────────────────────────────
//  WELCOME SCREEN
// ─────────────────────────────────────────────────────────────
function renderWelcome() {
  currentCmd = null;
  document.querySelectorAll('.cmd-item').forEach(el => el.classList.remove('active'));
  document.getElementById('breadcrumb').innerHTML = `
    <span style="color:var(--text3)">~</span>
    <span style="color:var(--text3)">/</span>
    <span>LinuxForge</span>
  `;

  const begCount = commands.filter(c=>c.level==='beginner').length;
  const intCount = commands.filter(c=>c.level==='intermediate').length;
  const advCount = commands.filter(c=>c.level==='advanced').length;

  document.getElementById('docPanel').innerHTML = `
    <div class="welcome-screen">
      <span class="welcome-badge">v2.0 — Interactive Learning Platform</span>
      <h1 class="welcome-title">Master<br>the <span>Terminal</span></h1>
      <p class="welcome-sub">
        A hands-on Linux command reference with live examples, interactive terminal,
        and step-by-step explanations from beginner to advanced.
        Click any command in the sidebar to explore.
      </p>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" style="color:var(--green)">${commands.length}</div>
          <div class="stat-label">Commands covered</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--cyan)">${Object.keys(CATEGORY_COLORS).length}</div>
          <div class="stat-label">Categories</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--purple)">∞</div>
          <div class="stat-label">Try in live terminal</div>
        </div>
      </div>

      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-family:var(--mono);margin-bottom:12px">Start Your Journey</div>
      <div class="path-cards">
        <div class="path-card" onclick="filterLevel('beginner', document.querySelectorAll('.level-tab')[1]); buildSidebar('beginner',''); selectCmd('ls')">
          <div class="path-card-icon" style="font-size:24px;margin-bottom:8px">🌱</div>
          <div class="path-card-title" style="color:var(--green)">Beginner</div>
          <div class="path-card-desc">${begCount} commands — navigation, files, text, permissions</div>
        </div>
        <div class="path-card" onclick="filterLevel('intermediate', document.querySelectorAll('.level-tab')[2]); buildSidebar('intermediate',''); selectCmd('sed')">
          <div class="path-card-icon" style="font-size:24px;margin-bottom:8px">⚡</div>
          <div class="path-card-title" style="color:var(--purple)">Intermediate</div>
          <div class="path-card-desc">${intCount} commands — sed, awk, find, ssh, scripting</div>
        </div>
        <div class="path-card" onclick="filterLevel('advanced', document.querySelectorAll('.level-tab')[3]); buildSidebar('advanced',''); selectCmd('strace')">
          <div class="path-card-icon" style="font-size:24px;margin-bottom:8px">🔥</div>
          <div class="path-card-title" style="color:var(--orange)">Advanced</div>
          <div class="path-card-desc">${advCount} commands — strace, tmux, iptables, rsync</div>
        </div>
      </div>

      <div style="margin-top:28px;padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;max-width:600px">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-family:var(--mono);margin-bottom:10px">Quick Try in Terminal →</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${['ls -lah','cat /etc/passwd','ps aux','df -h','ping -c3 google.com','grep root /etc/passwd','uname -a'].map(c=>
            `<button class="qbtn" onclick="quickRun('${c}')">${c}</button>`
          ).join('')}
        </div>
      </div>
    </div>
  `;
}
// ─── RESPONSIVE MGR ───────────────────────────────────────────
function toggleMobileMenu() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}

// Close menu on command selection on mobile
const originalSelectCmd = selectCmd;
selectCmd = function(id) {
  originalSelectCmd(id);
  if (window.innerWidth <= 768) {
    toggleMobileMenu();
  }
};

</script>
</body>
</html>
